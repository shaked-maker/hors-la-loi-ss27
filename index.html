<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HORS LA LOI — SS27 Flatlay Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; background: #f5f5f3; }

    .card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.04); }

    .tab-btn { transition: all .15s; }
    .tab-btn.active { background: #111; color: #fff; }
    .tab-btn:not(.active):hover { background: #e5e5e5; }

    .prompt-textarea {
      resize: none;
      font-size: 12px;
      line-height: 1.6;
      font-family: 'Inter', monospace;
      color: #333;
      background: #fafafa;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 10px 12px;
      width: 100%;
      min-height: 200px;
      transition: border-color .15s;
    }
    .prompt-textarea:focus { outline: none; border-color: #aaa; }

    .copy-btn {
      background: #111;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .copy-btn:hover { background: #333; }
    .copy-btn:active { transform: scale(.97); }
    .copy-btn.copied { background: #16a34a; }

    .upload-zone {
      border: 2px dashed #d0d0d0;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      background: #fafafa;
    }
    .upload-zone:hover { border-color: #999; background: #f3f3f3; }
    .upload-zone.dragover { border-color: #111; background: #f0f0f0; }
    .upload-zone.has-result { border-color: #16a34a; background: #f0fdf4; }

    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid #aaa;
      border-top-color: #333;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .badge {
      display: inline-block;
      background: #f0f0f0;
      color: #666;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .05em;
      padding: 2px 8px;
      border-radius: 20px;
      text-transform: uppercase;
    }
    .badge.femme { background: #fce7f3; color: #9d174d; }
    .badge.homme { background: #dbeafe; color: #1e40af; }

    .progress-bar {
      height: 3px;
      background: #e0e0e0;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #111;
      transition: width .3s ease;
    }

    .add-card {
      border: 2px dashed #d0d0d0;
      border-radius: 12px;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 220px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .add-card:hover { border-color: #999; background: #f3f3f3; }

    .api-modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.4);
      display: flex; align-items: center; justify-content: center; z-index: 50;
    }
    .api-modal {
      background: #fff; border-radius: 12px; padding: 28px;
      max-width: 420px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,.15);
    }
  </style>
</head>
<body class="min-h-screen">

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between gap-4 flex-wrap">
      <div>
        <h1 class="text-lg font-semibold tracking-tight text-gray-900">HORS LA LOI</h1>
        <p class="text-xs text-gray-400 tracking-widest uppercase">SS27 — Flatlay Prompt Generator</p>
      </div>
      <div class="flex items-center gap-3">
        <div class="flex gap-1 bg-gray-100 rounded-lg p-1">
          <button id="tab-femme" class="tab-btn active text-sm font-medium px-4 py-1.5 rounded-md" onclick="switchTab('femme')">Femme</button>
          <button id="tab-homme" class="tab-btn text-sm font-medium px-4 py-1.5 rounded-md" onclick="switchTab('homme')">Homme</button>
        </div>
        <button id="download-all-btn" onclick="downloadAll()"
          style="background:#111;color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:500;cursor:pointer;transition:background .15s;white-space:nowrap;"
          onmouseover="if(!this.disabled)this.style.background='#333'" onmouseout="if(!this.disabled)this.style.background='#111'">
          ↓ Download All
        </button>
      </div>
    </div>
    <div id="progress-bar" class="progress-bar" style="display:none">
      <div id="progress-bar-fill" class="progress-bar-fill" style="width:0%"></div>
    </div>
  </header>

  <!-- API Key Modal -->
  <div id="api-modal" class="api-modal-overlay" style="display:none">
    <div class="api-modal">
      <h2 style="font-size:15px;font-weight:600;margin-bottom:6px;">Anthropic API Key</h2>
      <p style="font-size:12px;color:#666;margin-bottom:16px;">Required once to analyze new garments with Claude. Stored only in your browser.</p>
      <input id="api-key-input" type="password" placeholder="sk-ant-..."
        style="width:100%;border:1px solid #ddd;border-radius:6px;padding:8px 10px;font-size:13px;margin-bottom:12px;box-sizing:border-box;" />
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button onclick="closeApiModal()" style="background:#f0f0f0;border:none;border-radius:6px;padding:7px 14px;font-size:12px;cursor:pointer;">Cancel</button>
        <button onclick="saveApiKey()" style="background:#111;color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:12px;cursor:pointer;">Save & Continue</button>
      </div>
    </div>
  </div>

  <div id="status-msg" class="max-w-7xl mx-auto px-6 pt-3 text-sm text-gray-500" style="display:none"></div>

  <main class="max-w-7xl mx-auto px-6 py-8">
    <div id="loading" class="text-center text-gray-400 py-16 text-sm">Loading garments…</div>
    <div id="grid-femme" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" style="display:none"></div>
    <div id="grid-homme" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" style="display:none"></div>
  </main>

  <script>
    const SUPABASE_URL = 'https://owdwcqxiavwejkocbtqp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_8bE4iRj0KUmZynK9uxqCww_lUUwyNhP';
    const SUPABASE_SERVICE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93ZHdjcXhpYXZ3ZWprb2NidHFwIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDQzMDkyMCwiZXhwIjoyMDkwMDA2OTIwfQ.9m3poyA957nZDEJkynqGf0k93HRDCONdhJGKRt4VM5U';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);
    const dbAdmin = createClient(SUPABASE_URL, SUPABASE_SERVICE_KEY);

    let allGarments = [];
    let pendingAddCollection = null;

    const EXTRACTION_SYSTEM = `You are a fashion technical analyst. You analyze CAD spec sheets for garments.
You will receive two images:
1. A garment spec sheet (artboard) showing front and back views, model code, fabric info, and color
2. A color card showing all available colors with their names and codes

Extract all relevant information and output ONLY the formatted flatlay prompt — no extra text, no explanation.`;

    const EXTRACTION_USER = `Analyze this garment spec sheet and the color card reference, then produce the flatlay prompt.

Use EXACTLY this format (replace placeholders with real values from the spec sheet):

Create a clean flatlay from the provided CAD.
{{GARMENT_TYPE}}, exact proportions
Front and back views.
Color:
{{AREA_1}} — {{COLOR_NAME_1}} ({{HEX_1}})
{{FRONT_DETAIL}}
{{BACK_DETAIL}}
Fabric:
{{AREA_1}} — {{FABRIC_NAME_1}}, {{TEXTURE_1}}
Clean panel lines and stitching.
Pure white background (#FFFFFF), centered, perfectly flat, soft shadow.

Rules:
- GARMENT_TYPE: full description e.g. "Cropped S/S T-shirt, boxy fit, dropped shoulders"
- COLOR areas: use the actual area name (e.g. "Body", "Collar", "Panels")
- COLOR_NAME: exact name from the color card (e.g. "Noir / BK001 Black")
- HEX: approximate hex based on the color card swatch
- FRONT_DETAIL: describe front graphic/print if any — omit line if none
- BACK_DETAIL: describe back graphic/print if any — omit line if none
- FABRIC areas: from the spec sheet fabric field
- Include all fabric components listed

Also include on the VERY FIRST LINE before the prompt (this line will be stripped):
MODEL_CODE: <the code from the spec sheet top-left box, e.g. HLK4401.QAFF>`;

    // ─── Init ────────────────────────────────────────────────
    async function init() {
      const { data, error } = await db
        .from('garments')
        .select('*')
        .order('collection')
        .order('filename');

      document.getElementById('loading').style.display = 'none';

      if (error || !data?.length) {
        document.getElementById('loading').textContent = 'No garments found.';
        document.getElementById('loading').style.display = 'block';
        return;
      }

      allGarments = data.map(row => ({
        collection: row.collection,
        filename: row.filename,
        cache_key: `${row.collection}/${row.filename}`,
        model_code: row.model_code || '',
        prompt: row.prompt || '',
        result_url: row.result_url || '',
        cad_image_url: row.cad_image_url || '',
      }));

      renderGrid('femme');
      renderGrid('homme');
      document.getElementById('grid-femme').style.display = '';
    }

    // ─── Tab switching ────────────────────────────────────────
    function switchTab(tab) {
      document.getElementById('grid-femme').style.display = tab === 'femme' ? '' : 'none';
      document.getElementById('grid-homme').style.display = tab === 'homme' ? '' : 'none';
      document.getElementById('tab-femme').classList.toggle('active', tab === 'femme');
      document.getElementById('tab-homme').classList.toggle('active', tab === 'homme');
    }

    // ─── Render grid ─────────────────────────────────────────
    function renderGrid(collection) {
      const grid = document.getElementById(`grid-${collection}`);
      grid.innerHTML = '';
      allGarments.filter(g => g.collection === collection).forEach(g => grid.appendChild(buildCard(g)));
      grid.appendChild(buildAddCard(collection));
    }

    function buildAddCard(collection) {
      const div = document.createElement('div');
      div.className = 'add-card';
      div.id = `add-card-${collection}`;
      div.onclick = () => triggerAddGarment(collection);
      div.innerHTML = `
        <div style="text-align:center;color:#bbb;pointer-events:none;">
          <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="margin:0 auto 8px;"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
          <p style="font-size:13px;font-weight:500;">Add Garment</p>
        </div>
        <input type="file" id="add-input-${collection}" accept="image/*" style="display:none"
               onchange="handleAddGarment(event,'${collection}')" />
      `;
      return div;
    }

    function safeKey(cacheKey) {
      return cacheKey.replace(/[^a-zA-Z0-9]/g, '-');
    }

    function buildCard(g) {
      const sk = safeKey(g.cache_key);
      const displayCode = g.model_code || g.filename.replace('@3x-100.jpg', '');
      const div = document.createElement('div');
      div.className = 'card';
      div.id = `card-${sk}`;

      div.innerHTML = `
        <div class="relative">
          <img src="${escHtml(g.cad_image_url)}"
               alt="${escHtml(displayCode)}"
               class="w-full object-contain bg-gray-50"
               style="max-height:320px; object-fit:contain;" />
        </div>
        <div class="p-4 space-y-3">
          <div class="flex items-center justify-between gap-2">
            <span class="font-semibold text-sm text-gray-900">${escHtml(displayCode)}</span>
            <span class="badge ${g.collection}">${g.collection}</span>
          </div>

          ${g.prompt ? `
            <textarea class="prompt-textarea" id="prompt-ta-${sk}">${escHtml(g.prompt)}</textarea>
            <div class="flex gap-2 mt-2">
              <button id="copy-btn-${sk}" class="copy-btn" onclick="copyPrompt('${sk}')">Copy Prompt</button>
            </div>
          ` : `<p class="text-xs text-gray-400 italic">No prompt available.</p>`}

          <div>
            <p class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-1.5">Finished Result</p>
            <div id="upload-zone-${sk}"
                 class="upload-zone ${g.result_url ? 'has-result' : ''}"
                 onclick="triggerUpload('${sk}')"
                 ondragover="onDragOver(event,'${sk}')"
                 ondragleave="onDragLeave('${sk}')"
                 ondrop="onDrop(event,'${g.cache_key}')">
              ${g.result_url
                ? `<img src="${escHtml(g.result_url)}" class="max-h-40 mx-auto rounded object-contain" alt="Result" />
                   <p class="text-xs text-green-600 font-medium mt-2">Uploaded ✓</p>`
                : `<svg class="mx-auto mb-2 text-gray-300" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>
                   <p class="text-xs text-gray-400">Drop finished flatlay here or click to upload</p>`
              }
            </div>
            <input type="file" id="file-input-${sk}" accept="image/*" style="display:none"
                   onchange="handleFileInput(event,'${g.cache_key}')" />
          </div>
        </div>
      `;
      return div;
    }

    // ─── Copy ─────────────────────────────────────────────────
    function copyPrompt(sk) {
      const ta = document.getElementById(`prompt-ta-${sk}`);
      const btn = document.getElementById(`copy-btn-${sk}`);
      navigator.clipboard.writeText(ta.value).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy Prompt'; btn.classList.remove('copied'); }, 1800);
      });
    }

    // ─── Upload ───────────────────────────────────────────────
    function triggerUpload(sk) {
      document.getElementById(`file-input-${sk}`).click();
    }

    function onDragOver(event, sk) {
      event.preventDefault();
      document.getElementById(`upload-zone-${sk}`).classList.add('dragover');
    }

    function onDragLeave(sk) {
      document.getElementById(`upload-zone-${sk}`).classList.remove('dragover');
    }

    function onDrop(event, cacheKey) {
      event.preventDefault();
      const sk = safeKey(cacheKey);
      onDragLeave(sk);
      const file = event.dataTransfer.files[0];
      if (file) uploadFile(file, cacheKey);
    }

    function handleFileInput(event, cacheKey) {
      const file = event.target.files[0];
      if (file) uploadFile(file, cacheKey);
    }

    async function uploadFile(file, cacheKey) {
      const sk = safeKey(cacheKey);
      const zone = document.getElementById(`upload-zone-${sk}`);
      const garment = allGarments.find(g => g.cache_key === cacheKey);

      zone.innerHTML = `<span class="spinner"></span><span class="text-xs text-gray-400">Uploading…</span>`;

      const ext = file.name.split('.').pop() || 'jpg';
      const storageName = garment?.model_code
        ? `${garment.model_code}.${ext}`
        : `${cacheKey.replace(/[^a-zA-Z0-9]/g, '_')}.${ext}`;

      // Upload to Supabase Storage (using service role to bypass RLS)
      const { error: uploadError } = await dbAdmin.storage
        .from('results')
        .upload(storageName, file, { contentType: file.type, upsert: true });

      if (uploadError) {
        zone.innerHTML = `<p class="text-xs text-red-500">Upload failed: ${escHtml(uploadError.message)}</p>`;
        return;
      }

      const { data: urlData } = dbAdmin.storage.from('results').getPublicUrl(storageName);
      const publicUrl = urlData.publicUrl;

      // Save URL to garments table
      const [collection, ...filenameParts] = cacheKey.split('/');
      const filename = filenameParts.join('/');
      await db.from('garments')
        .update({ result_url: publicUrl })
        .eq('collection', collection)
        .eq('filename', filename);

      if (garment) garment.result_url = publicUrl;

      zone.classList.add('has-result');
      zone.innerHTML = `
        <img src="${escHtml(publicUrl)}?t=${Date.now()}" class="max-h-40 mx-auto rounded object-contain" alt="Result" />
        <p class="text-xs text-green-600 font-medium mt-2">Uploaded ✓</p>
      `;
    }

    // ─── API Key Modal ────────────────────────────────────────
    function triggerAddGarment(collection) {
      const apiKey = localStorage.getItem('anthropic_api_key');
      if (!apiKey) {
        pendingAddCollection = collection;
        document.getElementById('api-modal').style.display = 'flex';
        setTimeout(() => document.getElementById('api-key-input').focus(), 100);
        return;
      }
      document.getElementById(`add-input-${collection}`).click();
    }

    function closeApiModal() {
      document.getElementById('api-modal').style.display = 'none';
      document.getElementById('api-key-input').value = '';
      pendingAddCollection = null;
    }

    function saveApiKey() {
      const key = document.getElementById('api-key-input').value.trim();
      if (!key) return;
      localStorage.setItem('anthropic_api_key', key);
      closeApiModal();
      if (pendingAddCollection) {
        document.getElementById(`add-input-${pendingAddCollection}`).click();
      }
    }

    // ─── Add Garment Flow ─────────────────────────────────────
    async function handleAddGarment(event, collection) {
      const file = event.target.files[0];
      if (!file) return;
      event.target.value = '';

      const apiKey = localStorage.getItem('anthropic_api_key');
      if (!apiKey) return;

      const addCard = document.getElementById(`add-card-${collection}`);
      const setStatus = (msg) => {
        addCard.innerHTML = `<div style="text-align:center;padding:20px;"><span class="spinner"></span><p style="font-size:12px;color:#666;margin-top:8px;">${msg}</p></div>`;
      };

      setStatus('Uploading CAD image…');

      // 1. Upload CAD to Supabase Storage
      const filename = file.name;
      const storageKey = `${collection}/${filename}`;
      const { error: cadErr } = await dbAdmin.storage
        .from('cad-images')
        .upload(storageKey, file, { contentType: file.type, upsert: true });

      if (cadErr) { resetAddCardWithError(addCard, collection, 'Upload failed: ' + cadErr.message); return; }

      const cadUrl = dbAdmin.storage.from('cad-images').getPublicUrl(storageKey).data.publicUrl;

      // 2. Convert CAD + colors to base64
      setStatus('Analyzing with Claude…');
      const cadBase64 = await fileToBase64(file);
      const content = [
        { type: 'image', source: { type: 'base64', media_type: file.type || 'image/jpeg', data: cadBase64 } }
      ];

      try {
        const colorsUrl = `${SUPABASE_URL}/storage/v1/object/public/cad-images/${collection}/colors.jpg`;
        const colorsResp = await fetch(colorsUrl);
        const colorsBlob = await colorsResp.blob();
        const colorsB64 = await blobToBase64(colorsBlob);
        content.push({ type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: colorsB64 } });
      } catch(e) {}

      content.push({ type: 'text', text: EXTRACTION_USER });

      // 3. Call Claude API
      let rawResponse;
      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'content-type': 'application/json',
            'anthropic-dangerous-direct-browser-usage': 'true'
          },
          body: JSON.stringify({
            model: 'claude-opus-4-6',
            max_tokens: 1024,
            system: EXTRACTION_SYSTEM,
            messages: [{ role: 'user', content }]
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error?.message || 'API error');
        rawResponse = data.content[0].text.trim();
      } catch(e) {
        resetAddCardWithError(addCard, collection, 'Claude error: ' + e.message);
        return;
      }

      // 4. Parse model code + prompt
      let modelCode = '', prompt = rawResponse;
      const lines = rawResponse.split('\n');
      if (lines[0].startsWith('MODEL_CODE:')) {
        modelCode = lines[0].replace('MODEL_CODE:', '').trim();
        prompt = lines.slice(1).join('\n').trim();
      }

      // 5. Save to Supabase
      const newRow = { collection, filename, model_code: modelCode, prompt, cad_image_url: cadUrl, result_url: '' };
      const { error: saveErr } = await dbAdmin.from('garments').upsert(newRow, { on_conflict: 'collection,filename' });
      if (saveErr) { resetAddCardWithError(addCard, collection, 'Save failed: ' + saveErr.message); return; }

      // 6. Add card to grid
      const g = { ...newRow, cache_key: `${collection}/${filename}` };
      allGarments.push(g);
      const grid = document.getElementById(`grid-${collection}`);
      grid.insertBefore(buildCard(g), addCard);

      // Restore add card
      addCard.className = 'add-card';
      addCard.onclick = () => triggerAddGarment(collection);
      addCard.innerHTML = `
        <div style="text-align:center;color:#bbb;pointer-events:none;">
          <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="margin:0 auto 8px;"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
          <p style="font-size:13px;font-weight:500;">Add Garment</p>
        </div>
        <input type="file" id="add-input-${collection}" accept="image/*" style="display:none"
               onchange="handleAddGarment(event,'${collection}')" />
      `;
    }

    function resetAddCardWithError(addCard, collection, msg) {
      addCard.className = 'add-card';
      addCard.onclick = () => triggerAddGarment(collection);
      addCard.innerHTML = `
        <div style="text-align:center;pointer-events:none;">
          <p style="font-size:11px;color:#ef4444;margin-bottom:8px;">${escHtml(msg)}</p>
          <p style="font-size:12px;color:#999;">Click to try again</p>
        </div>
        <input type="file" id="add-input-${collection}" accept="image/*" style="display:none"
               onchange="handleAddGarment(event,'${collection}')" />
      `;
    }

    async function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function blobToBase64(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    // ─── Download All ─────────────────────────────────────────
    async function downloadAll() {
      const btn = document.getElementById('download-all-btn');
      btn.disabled = true;
      btn.style.opacity = '0.5';
      btn.style.cursor = 'not-allowed';

      const zip = new JSZip();
      let done = 0;
      const total = allGarments.length;

      for (const g of allGarments) {
        const modelName = g.model_code || g.filename.replace('@3x-100.jpg', '');
        const folder = zip.folder(modelName);
        btn.textContent = `↓ ${done}/${total}…`;

        // CAD image
        if (g.cad_image_url) {
          try {
            const resp = await fetch(g.cad_image_url);
            const blob = await resp.blob();
            const ext = (g.cad_image_url.split('.').pop().split('?')[0] || 'jpg').toLowerCase();
            folder.file(`CAD_${modelName}.${ext}`, blob);
          } catch(e) {}
        }

        // Result image
        if (g.result_url) {
          try {
            const resp = await fetch(g.result_url);
            const blob = await resp.blob();
            const ext = (g.result_url.split('.').pop().split('?')[0] || 'jpg').toLowerCase();
            folder.file(`${modelName}.${ext}`, blob);
          } catch(e) {}
        }

        done++;
      }

      btn.textContent = '↓ Zipping…';
      const zipBlob = await zip.generateAsync({ type: 'blob' });
      saveAs(zipBlob, 'HORS_LA_LOI_SS27.zip');

      btn.disabled = false;
      btn.style.opacity = '1';
      btn.style.cursor = 'pointer';
      btn.textContent = '↓ Download All';
    }

    // ─── Utils ────────────────────────────────────────────────
    function escHtml(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    init();
  </script>
</body>
